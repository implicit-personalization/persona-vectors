site_name: persona-vectors
repo_url: https://github.com/implicit-personalization/persona-vectors
docs_dir: docs
theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Overview: index.md
  - Activation Extraction: extraction.md
  - Artifacts: artifacts.md
  - Analysis: analysis.md
  - Probes: probes.md
  - Steering: steering.md
